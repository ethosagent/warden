name: release

# On a version tag, build cross-platform binaries, publish a GitHub Release, and
# sign the checksums with KEYLESS cosign (Sigstore via GitHub OIDC) — no
# long-lived signing keys; the signing identity is this workflow.
# A CycloneDX SBOM (syft) is also attached; its hash is in the signed
# checksums.txt, so the signature covers the SBOM too.
# Each artifact also gets a SLSA build-provenance attestation; verify with:
#   gh attestation verify warden-linux-amd64 --repo ethosagent/warden
#
# A multi-arch image (linux/amd64 + linux/arm64) is also built and pushed to
# Docker Hub (docker.io/ethosagent/warden), with an SBOM + SLSA provenance on the
# digest and a keyless cosign signature. Verify:
#   cosign verify ethosagent/warden:<tag> \
#     --certificate-identity-regexp 'https://github.com/ethosagent/warden/.*' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com
#
# Verify a downloaded release:
#   cosign verify-blob \
#     --certificate checksums.txt.pem \
#     --signature checksums.txt.sig \
#     --certificate-identity-regexp 'https://github.com/ethosagent/warden/.*' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     checksums.txt
#   # then confirm your binary's line in the now-trusted checksums.txt:
#   sha256sum --check --ignore-missing checksums.txt

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write      # create the release + upload assets
  id-token: write      # keyless cosign signing + provenance via OIDC
  attestations: write  # SLSA build-provenance attestations

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags for version stamping

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${target%/*}"
            arch="${target#*/}"
            out="dist/warden-${os}-${arch}"
            echo "building ${out}"
            GOOS="${os}" GOARCH="${arch}" scripts/build.sh "${out}"
          done

      - name: Generate SBOM (syft → CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: dist/warden-sbom.cyclonedx.json

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/warden-*'

      - name: Generate checksums
        working-directory: dist
        run: sha256sum warden-* warden-sbom.cyclonedx.json > checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign checksums (keyless)
        working-directory: dist
        run: |
          cosign sign-blob --yes \
            --output-signature checksums.txt.sig \
            --output-certificate checksums.txt.pem \
            checksums.txt

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/warden-* dist/warden-sbom.cyclonedx.json dist/checksums.txt dist/checksums.txt.sig dist/checksums.txt.pem

  image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/ethosagent/warden
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push (multi-arch, SBOM + provenance)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
          sbom: true
          provenance: mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "docker.io/ethosagent/warden@${DIGEST}"
