# Warden worker (data plane), driven by a control plane.
#
# This worker is CP-MANAGED: its allow/deny policy comes ONLY from the control
# plane (no local allowlist needed). It boots fail-closed (denies all egress)
# until its first pull, then enforces CP policy and hot-reloads on every change.
# Secrets stay LOCAL to this worker and never cross to the control plane.

# No `policy.allowlist` here — a managed worker gets it from the control plane.
# (Set controlPlane.localOnly: true, or run with --local-only, to enforce a local
#  policy standalone; that mode DOES require an allowlist.)

# Secrets live here, on the worker — never on the control plane. (Demo mapping;
# the synthetic agent doesn't use it, but it shows where secrets belong.)
secrets:
  - placeholder: example_secret_001
    envVar: EXAMPLE_SECRET

logging:
  level: info
  format: json

# Deep MCP analysis. monitor = detect + analyze + log, never block. With this on,
# MCP-over-HTTP traffic (e.g. mcp.linear.app) is parsed: tool inventory + observed
# request/response schema, surfaced in the dashboard and forwarded to the CP.
mcp:
  enabled: true
  mode: monitor
  scan:
    evidence: true   # keep a MASKED sample (•••• + last-4 + length, never the raw value) per
                     # finding, so the dashboard can show what tripped a credential_leak/pii flag.
                     # LOCAL config — the masked sample never leaves the worker except inside the
                     # value-free MCP schema it already forwards to the control plane.

# Long-poll allow/deny policy from the control plane; trust its (privately-signed)
# cert via the same proxy CA this worker already uses.
controlPlane:
  endpoint: https://control-plane:7070/policy
  tokenEnv: WARDEN_CP_TOKEN
  caCert: /etc/warden/certs/proxy-ca.crt
  longPollWait: 30s         # how long the CP holds /policy open before returning 304
  heartbeatInterval: 10s    # liveness ping cadence
  localOnly: false          # true = ignore the CP and enforce local policy (standalone)

# Forward this worker's analytics to the control plane's aggregator.
central:
  mode: worker
  endpoint: https://control-plane:7070/central/ingest
  tokenEnv: WARDEN_CP_TOKEN
  proxyID: ${WARDEN_PROXY_ID}   # set per worker so the fleet view can slice by proxy
  caCert: /etc/warden/certs/proxy-ca.crt
  mcpPushInterval: 30s          # forward MCP inventory + observed schema (when mcp.enabled)
                                # so the control-plane dashboard shows MCP per worker
