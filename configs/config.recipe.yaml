# Generic Warden starter config — ALLOW-ALL, full visibility (first run).
#
# Use this with any of the docs/recipes/ compose files to get every agent egress
# call routed through Warden and LOGGED — domain, method, URL, status — without
# blocking anything yet. Once you SEE real traffic in the dashboard
# (http://localhost:9090/dashboard/), tighten `policy.allowlist` to just the
# hosts the agent actually needs and add `secrets:` placeholder->envVar mappings.
#
# `~.*` is a regex catch-all: it allows every host. Warden's front door is
# CONNECT-only, so this covers all HTTPS (:443) traffic. TLS is terminated, so
# the method/URL/headers are visible (logged headers-only, secret-by-reference).

policy:
  allowlist:
    - domain: "~.*"            # allow every host (HTTPS/443). Visibility-first; tighten later.

cache:
  ttl: 3600

logging:
  level: info
  format: json                 # structured JSON decision logs (one per call)

observability:
  enabled: true
  metrics:
    enabled: true              # Prometheus /metrics on the admin listener
