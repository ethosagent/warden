# Managed WORKER for the recipe agents (hermes / openclaw / zeroclaw).
#
# Allow/deny policy comes ONLY from the control plane (config.cp-served.yaml).
# This worker boots fail-closed (denies all egress) until its first policy pull,
# then enforces CP policy and hot-reloads on every change. Secrets + response
# scanning stay LOCAL to this worker and never cross to the control plane.

logging:
  level: info
  format: json

# Non-MCP HTTP response DLP scanning (detect + log, surfaced in the dashboard,
# never blocks). Flip mode to `enforce` to 502 high-severity leaks/injections.
responseScan:
  enabled: true
  mode: monitor
  maxBodyBytes: 1048576        # 1 MiB cap; streaming/over-cap/binary bodies are skipped + logged
  evidence: true               # keep a MASKED sample (••••+last-4+len, never raw) per finding
  pii:
    phone: false               # email/card(Luhn)/SSN always on; phone opt-in (noisy)

# Hand the agent PLACEHOLDER tokens (e.g. openai_secret_001) and map them to real
# env vars here — real keys live on the worker, never with the agent:
# secrets:
#   - placeholder: openai_secret_001
#     envVar: OPENAI_API_KEY

# Long-poll allow/deny policy from the control plane; trust its cert via the same
# proxy CA this worker already uses.
controlPlane:
  endpoint: https://control-plane:7070/policy
  tokenEnv: WARDEN_CP_TOKEN
  caCert: /etc/warden/certs/proxy-ca.crt
  longPollWait: 30s
  heartbeatInterval: 10s
  localOnly: false

# Forward this worker's analytics to the control plane's fleet aggregator.
central:
  mode: worker
  endpoint: https://control-plane:7070/central/ingest
  tokenEnv: WARDEN_CP_TOKEN
  proxyID: ${WARDEN_PROXY_ID}
  caCert: /etc/warden/certs/proxy-ca.crt
  mcpPushInterval: 30s
