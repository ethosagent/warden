# Warden — example configuration
#
# This is the phase-1 (local) config shape. The same schema is reused when
# config later comes from a control-plane pull, so nothing here is throwaway.
#
# Core invariant: the allowlist is DEFAULT-DENY. Any destination not listed
# below is blocked. Secrets are referenced by placeholder only — the agent
# holds the placeholder, never the real value; the real value is injected at
# the proxy edge from the mapped environment variable.

policy:
  # Default-deny allowlist. A destination is permitted only if it matches an
  # entry here. Port is optional: when omitted, Warden infers 443 (HTTPS) or
  # 80 (HTTP) from the request scheme.
  allowlist:
    - domain: api.openai.com            # port omitted -> inferred 443 (HTTPS)
    - domain: api.anthropic.com
    - domain: "*.internal.company.com"  # wildcard matches subdomains (not the apex)
      port: 8443                        # explicit port overrides inference
      rateLimit: "100/hour"             # per-rule rate limit
      timeWindow: "9-17"               # allowed hours (local time)
  denylist:
    - domain: evil.example.com
    - domain: "*.malware.net"

# Placeholder -> environment variable mapping for the phase-1 ENV secret
# provider. The agent only ever holds the placeholder (e.g. openai_secret_001);
# Warden swaps it for the real value of OPENAI_API_KEY at the edge.
secrets:
  - placeholder: openai_secret_001
    envVar: OPENAI_API_KEY
  - placeholder: anthropic_secret_001
    envVar: ANTHROPIC_API_KEY

# In-memory secret cache. Never persisted to disk.
cache:
  ttl: 3600                             # seconds; on expiry Warden refreshes
                                        # silently and keeps the stale value if
                                        # a silent refresh fails.

# Observability output. Logs reference secrets by hash/last-4/version only and
# never contain full request/response bodies.
logging:
  level: info                           # debug | info | warn | error
  format: json                          # json | text

# OpenTelemetry observability (Phase 1: metrics + structured logging). OFF by
# default; when disabled there is zero behavior change and no added latency.
# Metric labels are bounded enums/configured names only — never a raw domain,
# never a secret value, never a body. Traces (Phase 2) and collector recipes
# (Phase 3) are deferred. Standard OTEL_* env vars override this block:
# OTEL_SERVICE_NAME -> serviceName, OTEL_EXPORTER_OTLP_ENDPOINT -> otlpEndpoint.
observability:
  enabled: false                        # master switch for the OTel emission seam
  serviceName: warden                   # OTel resource service.name
  metrics:
    enabled: true                       # serve Prometheus /metrics on the ADMIN listener (not the proxy port)
    otlpEndpoint: ""                    # optional OTLP/grpc push, e.g. otel-collector:4317
  resourceAttributes: {}                # extra bounded resource attrs (e.g. warden.proxy.id); never secrets

# Optional inline LLM judge. OFF by default. The judge is NEVER authoritative:
# static allow/deny rules always win, and it is consulted ONLY for requests that
# match neither list (a "no-match"). It fails closed (deny) on any error and
# never sees secret values — only auth presence. Static rules are untouched.
judge:
  enabled: false                        # inline judge off by default
  provider: openai                      # OpenAI-compatible chat-completions API
  model: gpt-4o-mini
  baseURL: https://api.openai.com/v1
  apiKeyEnv: OPENAI_API_KEY             # env var holding the API key (never logged)
  timeout: 5s                           # hard per-call timeout
  circuitBreaker:
    maxFailures: 5                      # trip after N consecutive failures
    cooldown: 30s                       # deny-all window while tripped
  cache:
    ttl: 5m                             # verdict cache TTL
  rateLimit: 100/minute                 # cap on judge invocations

# Per-agent natural-language policies, interpreted by the inline judge. With one
# proxy per agent, the single agent id below is used for judge lookups.
agents:
  - id: default
    policy: |
      This agent may read from approved APIs. It must NOT post to social media,
      access internal admin endpoints, or make requests outside business hours.

# Offline advisory mode (CLI: `warden advise`). OFF by default. It only flags
# recommendations to humans and can never alter policy. Hard deterministic
# auto-rules are configured independently of the LLM (not yet implemented).
advisory:
  enabled: false

# MCP egress wedge. OFF by default: when mcp.enabled is false there is zero new
# code on the hot path and byte-identical behavior to a Warden without it. When
# enabled, live MCP-over-HTTP traffic (already decrypted by TLS termination) is
# routed through the deep MCP analyzers — tool policy, schema-drift, poisoning,
# call-chain, and content scan. Three modes:
#   off      - no MCP processing.
#   monitor  - detect + analyze + log + metric, NEVER block (the adoption wedge).
#   enforce  - monitor PLUS block (deny non-allowlisted tools, high-severity
#              findings, pinned-schema drift).
# MCP analysis only ever makes a decision MORE restrictive; it never re-allows a
# request the domain/port default-deny already blocked. Never persists tool
# arguments, results, or matched content — only bounded enums and counts.
mcp:
  enabled: false                  # master switch (default false)
  mode: monitor                   # off | monitor | enforce (default monitor when enabled)
  failClosedOnError: false        # analysis error -> deny? default false (fail-open)
  maxResponseScanBytes: 1048576   # cap on buffered response scanning (1 MiB)
  tools:                          # default-deny tool policy (deny wins over allow)
    allow: []                     # permitted tool names; empty + enforce = deny all tools/call
    deny: []                      # blocked tool names; wins over allow
    rateLimit: {}                 # tool name -> "N/second|minute|hour"
  schema:
    pin: false                    # block on any tools/list drift (enforce mode)
  scan:
    toolArgs: true                # scan outbound tool arguments
    toolResults: true             # scan inbound tool results
    profileSchema: true           # learn + merge observed in/out schema per tool
    pii:
      phone: false                # email/card(Luhn)/SSN always on; phone opt-in (noisy)
  chain:
    enabled: true                 # per-session call-chain analysis
    windowSize: 50                # sliding-window size (must be > 0)
    patterns: [read_then_send, permission_probing, rapid_repeat]
