# Warden — example configuration
#
# This is the phase-1 (local) config shape. The same schema is reused when
# config later comes from a control-plane pull, so nothing here is throwaway.
#
# Core invariant: the allowlist is DEFAULT-DENY. Any destination not listed
# below is blocked. Secrets are referenced by placeholder only — the agent
# holds the placeholder, never the real value; the real value is injected at
# the proxy edge from the mapped environment variable.

policy:
  # Default-deny allowlist. A destination is permitted only if it matches an
  # entry here. Port is optional: when omitted, Warden infers 443 (HTTPS) or
  # 80 (HTTP) from the request scheme.
  allowlist:
    - domain: api.openai.com            # port omitted -> inferred 443 (HTTPS)
    - domain: api.anthropic.com
    - domain: "*.internal.company.com"  # wildcard matches subdomains (not the apex)
      port: 8443                        # explicit port overrides inference
      rateLimit: "100/hour"             # per-rule rate limit
      timeWindow: "9-17"               # allowed hours (local time)
  denylist:
    - domain: evil.example.com
    - domain: "*.malware.net"

# Placeholder -> environment variable mapping for the phase-1 ENV secret
# provider. The agent only ever holds the placeholder (e.g. openai_secret_001);
# Warden swaps it for the real value of OPENAI_API_KEY at the edge.
secrets:
  - placeholder: openai_secret_001
    envVar: OPENAI_API_KEY
  - placeholder: anthropic_secret_001
    envVar: ANTHROPIC_API_KEY

# In-memory secret cache. Never persisted to disk.
cache:
  ttl: 3600                             # seconds; on expiry Warden refreshes
                                        # silently and keeps the stale value if
                                        # a silent refresh fails.

# Observability output. Logs reference secrets by hash/last-4/version only and
# never contain full request/response bodies.
logging:
  level: info                           # debug | info | warn | error
  format: json                          # json | text

# OpenTelemetry observability (Phase 1: metrics + structured logging). OFF by
# default; when disabled there is zero behavior change and no added latency.
# Metric labels are bounded enums/configured names only — never a raw domain,
# never a secret value, never a body. Traces (Phase 2) and collector recipes
# (Phase 3) are deferred. Standard OTEL_* env vars override this block:
# OTEL_SERVICE_NAME -> serviceName, OTEL_EXPORTER_OTLP_ENDPOINT -> otlpEndpoint.
observability:
  enabled: false                        # master switch for the OTel emission seam
  serviceName: warden                   # OTel resource service.name
  metrics:
    enabled: true                       # serve Prometheus /metrics on the ADMIN listener (not the proxy port)
    otlpEndpoint: ""                    # optional OTLP/grpc push, e.g. otel-collector:4317
  resourceAttributes: {}                # extra bounded resource attrs (e.g. warden.proxy.id); never secrets

# Optional inline LLM judge. OFF by default. The judge is NEVER authoritative:
# static allow/deny rules always win, and it is consulted ONLY for requests that
# match neither list (a "no-match"). It fails closed (deny) on any error and
# never sees secret values — only auth presence. Static rules are untouched.
judge:
  enabled: false                        # inline judge off by default
  provider: openai                      # OpenAI-compatible chat-completions API
  model: gpt-4o-mini
  baseURL: https://api.openai.com/v1
  apiKeyEnv: OPENAI_API_KEY             # env var holding the API key (never logged)
  timeout: 5s                           # hard per-call timeout
  circuitBreaker:
    maxFailures: 5                      # trip after N consecutive failures
    cooldown: 30s                       # deny-all window while tripped
  cache:
    ttl: 5m                             # verdict cache TTL
  rateLimit: 100/minute                 # cap on judge invocations

# Per-agent natural-language policies, interpreted by the inline judge. With one
# proxy per agent, the single agent id below is used for judge lookups.
agents:
  - id: default
    policy: |
      This agent may read from approved APIs. It must NOT post to social media,
      access internal admin endpoints, or make requests outside business hours.

# Offline advisory mode (CLI: `warden advise`). OFF by default. It only flags
# recommendations to humans and can never alter policy. Hard deterministic
# auto-rules are configured independently of the LLM (not yet implemented).
advisory:
  enabled: false

# MCP egress wedge. OFF by default: when mcp.enabled is false there is zero new
# code on the hot path and byte-identical behavior to a Warden without it. When
# enabled, live MCP-over-HTTP traffic (already decrypted by TLS termination) is
# routed through the deep MCP analyzers — tool policy, schema-drift, poisoning,
# call-chain, and content scan. Three modes:
#   off      - no MCP processing.
#   monitor  - detect + analyze + log + metric, NEVER block (the adoption wedge).
#   enforce  - monitor PLUS block (deny non-allowlisted tools, high-severity
#              findings, pinned-schema drift).
# MCP analysis only ever makes a decision MORE restrictive; it never re-allows a
# request the domain/port default-deny already blocked. Never persists tool
# arguments, results, or matched content — only bounded enums and counts.
mcp:
  enabled: false                  # master switch (default false)
  mode: monitor                   # off | monitor | enforce (default monitor when enabled)
  failClosedOnError: false        # analysis error -> deny? default false (fail-open)
  maxResponseScanBytes: 1048576   # cap on buffered response scanning (1 MiB)
  tools:                          # default-deny tool policy (deny wins over allow)
    allow: []                     # permitted tool names; empty + enforce = deny all tools/call
    deny: []                      # blocked tool names; wins over allow
    rateLimit: {}                 # tool name -> "N/second|minute|hour"
    constraints: {}               # per-tool argument constraints (checked after allow/deny);
                                  # values are inspected transiently, never stored. Example:
                                  #   read_file:
                                  #     maxArgsBytes: 65536            # cap on raw arguments size (0 = unlimited)
                                  #     fields:
                                  #       path:      { match: "^/workspace/.*", maxLen: 4096, required: true }
                                  #       recursive: { forbidden: true }
                                  #   deploy:
                                  #     allowWhen:                     # further gate an ALLOWED tool (never re-allows)
                                  #       agentId: "ci-agent"          # permit only for this agent id
                                  #       timeWindow: "09-17"          # permit only within HH-HH (server local, 0-23)
  schema:
    pin: false                    # block on any tools/list drift (enforce mode)
  scan:
    toolArgs: true                # scan outbound tool arguments
    toolResults: true             # scan inbound tool results
    profileSchema: true           # learn + merge observed in/out schema per tool
    evidence: false               # opt-in: keep a MASKED sample per finding (•••• + last-4 + length,
                                  #         NEVER the raw value) so you can tell a real leak from a
                                  #         false positive in the dashboard. Local config (not distributed).
    pii:
      phone: false                # email/card(Luhn)/SSN always on; phone opt-in (noisy)
  chain:
    enabled: true                 # per-session call-chain analysis
    windowSize: 50                # sliding-window size (must be > 0)
    patterns: [read_then_send, permission_probing, rapid_repeat]
  scopes: {}                      # task-scoped authorization: approve a PURPOSE once, then the
                                  # gateway holds the agent to that purpose's tool-set on every
                                  # call. Scopes only NARROW the tools.allow policy (a tool must be
                                  # base-allowed first) and never re-permit a denied/restricted tool.
                                  # Absent = no scoping. LOCAL config. Example:
                                  #   activeScope: triage-readonly   # global active scope id
                                  #   outOfScope: deny               # deny (default) | escalate
                                  #   perAgent:                      # optional per-agent override
                                  #     reporting-bot: triage-readonly
                                  #   list:
                                  #     - id: triage-readonly
                                  #       purpose: "Read-only triage; never send."
                                  #       tools: [get_customer, read_ticket]   # in-scope tool-set
                                  #       constraints:                          # reuses tools.constraints shape
                                  #         get_customer:
                                  #           fields: { id: { match: "^[0-9]+$", required: true } }
                                  # An out-of-scope call is denied+logged (mcp_out_of_scope) in enforce;
                                  # monitor logs without blocking. outOfScope: escalate is DEFERRED —
                                  # with no approval channel it degrades to deny (never widens access).
  servers: []                     # per-server binary-integrity pinning for the `warden mcp` wedge.
                                  # Select an entry at launch with `--server <name>`; the wedge then
                                  # verifies the resolved server binary before starting and REFUSES to
                                  # launch on any mismatch (fail-closed). All fields are hex. sha256 and
                                  # the ed25519 signature compose: when both are set, both must pass.
                                  # CLI flags (--verify-sha256, --verify-ed25519-pubkey,
                                  # --verify-ed25519-sig) override the matching config field. LOCAL config.
                                  # Example:
                                  #   - name: github-mcp              # matched by `warden mcp --server github-mcp`
                                  #     sha256: 3b1f...                # expected SHA-256 of the binary (hex)
                                  #     ed25519PublicKey: 9a0c...      # 32-byte signing public key (hex)
                                  #     ed25519Signature: 4d2e...      # 64-byte detached signature over the binary (hex)
                                  # A signature requires a public key; a signature without one is rejected.

# Per-destination request-authentication transforms. The agent sends a request
# with a placeholder or no auth at all; Warden injects real, request-scoped
# credentials at the edge. Credentials are read from the environment via ${VAR}
# and held by the proxy only — never seen by the agent, never logged.
# `match` uses the policy syntax: exact host, "*.suffix", or "~regex".
# Types: oauth2_client_credentials | aws_sigv4 | hmac | api_key.
auth: []
  # - match: api.salesforce.com
  #   type: oauth2_client_credentials
  #   tokenURL: https://login.salesforce.com/services/oauth2/token
  #   clientID: ${SALESFORCE_CLIENT_ID}
  #   clientSecret: ${SALESFORCE_CLIENT_SECRET}
  #   scopes: [api]
  # - match: "~\\.amazonaws\\.com$"
  #   type: aws_sigv4
  #   region: us-east-1
  #   service: bedrock                 # optional; many APIs need it explicit
  #   accessKeyID: ${AWS_ACCESS_KEY_ID}
  #   secretAccessKey: ${AWS_SECRET_ACCESS_KEY}
  #   sessionToken: ${AWS_SESSION_TOKEN}   # optional (assumed roles / IRSA)
  # - match: api.stripe.com
  #   type: hmac
  #   algorithm: sha256                # sha256 | sha512 | sha1
  #   secret: ${STRIPE_WEBHOOK_SECRET}
  #   header: Stripe-Signature
  # - match: api.sendgrid.com
  #   type: api_key
  #   location: header                 # header | basic_auth
  #   name: Authorization
  #   value: "Bearer ${SENDGRID_API_KEY}"

# Control plane (remote policy). When endpoint is set, Warden pulls its
# allow/deny policy from the control plane at startup and re-pulls every
# pollInterval, hot-swapping the live evaluator with NO restart. A failed pull
# keeps the last-known-good policy, so a worker survives a control-plane outage.
# Secrets/judge/observability stay from this local file.
controlPlane:
  endpoint: ""                    # https URL of the policy endpoint ("" disables)
  tokenEnv: ""                    # env var holding the bearer token
  caCert: ""                      # CA (PEM) to trust the CP's cert, per-connection only
  longPollWait: 30s               # how long the CP holds /policy open before 304
  heartbeatInterval: 10s          # liveness ping cadence
  localOnly: false                # true = ignore the CP, enforce local policy (standalone)
  # When endpoint is set and localOnly is false, the worker is CP-MANAGED: policy
  # comes only from the control plane and the worker boots fail-closed (deny all)
  # until its first pull. Secrets always stay local.

# Fleet analytics aggregation.
#   off        - single node (default).
#   aggregator - host POST /central/ingest on the admin listener; the dashboard
#                shows the fleet-wide central store instead of this node's db.
#   worker     - forward this proxy's local events to a remote aggregator.
central:
  mode: off                       # off | aggregator | worker
  tokenEnv: ""                    # bearer token env (ingest auth, both sides)
  maxEvents: 0                    # aggregator: central retention cap (0 = default)
  endpoint: ""                    # worker: aggregator ingest URL
  proxyID: ""                     # worker: label this proxy's events
  batchSize: 100                  # worker: events per forward batch
  bufferCap: 10000                # worker: local buffer cap before dropping oldest
  interval: 10s                   # worker: forward cadence
  mcpPushInterval: 30s            # worker: how often to forward the MCP inventory + schema
                                  #   (push-on-change is automatic; needs mcp.enabled)
  forwardSecretInventory: false   # worker: forward configured secrets BY REFERENCE
                                  #   (sha256/last4/length, NEVER values) to the CP

# Audit features. Signed receipts emit an Ed25519-signed, independently
# verifiable record per mediated event (tamper-evident evidence). Compliance
# tags each event with OWASP/MITRE control IDs for governance reporting.
audit:
  signedReceipts:
    enabled: false                # off by default
    keyFile: ""                   # Ed25519 PKCS#8 PEM; generated+persisted if absent
    log: ""                       # JSONL receipts path (required when enabled)
  compliance:
    enabled: false                # tag events with OWASP/MITRE control IDs
