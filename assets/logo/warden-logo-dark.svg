    <circle cx="96" cy="118" r="13" fill="#F59E0B"/>
    <rect x="144" y="92" width="12" height="18" rx="3" fill="#2DD4BF"/>
    <rect x="144" y="126" width="12" height="18" rx="3" fill="#2DD4BF"/>
    <path d="M108 112 L156 112 L156 100 L192 118 L156 136 L156 124 L108 124 Z" fill="url(#swapD)"/>
  </g>

  <!-- wordmark (light, for dark backgrounds) -->
  <text x="188" y="108" font-family="'Inter','Segoe UI',Helvetica,Arial,sans-serif" font-size="76" font-weight="800" letter-spacing="2" fill="#F1F5F9">WARDEN</text>
  <text x="190" y="146" font-family="'Inter','Segoe UI',Helvetica,Arial,sans-serif" font-size="21" font-weight="500" letter-spacing="3.5" fill="#94A3B8">EGRESS GUARDRAIL FOR AI AGENTS</text>
</svg>
