<svg width="680" height="200" viewBox="0 0 680 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Warden — egress guardrail for AI agents">
  <defs>
    <linearGradient id="shieldD" x1="128" y1="42" x2="128" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#334155"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="swapD" x1="96" y1="118" x2="192" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="0.48" stop-color="#F59E0B"/>
      <stop offset="0.60" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#2DD4BF"/>
