# Run Hermes Agent behind a Warden WORKER, driven by a Warden CONTROL PLANE.
#
# Topology (the real control-plane / data-plane split):
#   control-plane  — serves allow/deny policy and aggregates the worker's
#                    analytics into a fleet dashboard. Holds NO secrets.
#   warden (worker)— the data plane Hermes's egress flows through: pulls policy
#                    from the control plane (managed; boots fail-closed until
#                    first pull), terminates TLS, logs every call, forwards
#                    analytics to the control plane.
#   hermes         — isolated on an INTERNAL-ONLY network; its sole route out is
#                    the worker.
#
# Hermes is Node-based (and bundles an OpenAI-compatible API layer); Node's
# built-in fetch (undici) IGNORES HTTP(S)_PROXY unless NODE_USE_ENV_PROXY=1 is
# set — without it, egress goes direct, fails on the isolated network, and never
# reaches Warden.
#
# The control-plane role is NEWER than the published tag, so both services use a
# LOCALLY BUILT image — run with `--build`.
#
# Prereq (run from the repo root): generate the bake-once CA into ./certs:
#   OUT_DIR=deploy/compose/certs ./scripts/gen-certs.sh
#
# Run (from the repo root):
#   WARDEN_CP_TOKEN=dev-token \
#   docker compose -f deploy/compose/docker-compose.hermes.yml up --build
#
# Hermes API: http://localhost:8642   ·   Hermes dashboard: http://localhost:9119 (login: admin / warden)
# Fleet dashboard (control plane): https://localhost:7070/dashboard/  (proxy-CA cert — trust it)
# Worker-local dashboard:          http://localhost:9090/dashboard/

services:
  control-plane:
    # The control-plane role is newer than the published tag → local build.
    # Run with `--build`.
    build:
      context: ../..
      dockerfile: Dockerfile
    image: warden-proxy:dev        # locally built from this repo's Dockerfile
    pull_policy: never             # never fetch from a registry — use the local build
    networks: [cp-net]
    ports:
      - "7070:7070"                  # fleet dashboard + /policy + /central/ingest
    environment:
      - WARDEN_CP_TOKEN=${WARDEN_CP_TOKEN:-dev-token}
    volumes:
      - ../../configs/config.cp-served.yaml:/etc/warden/config.yaml:ro   # served policy
      - ./certs:/etc/warden/certs:ro
      - hermes-cp-data:/data         # writable state: fleet analytics DB + editable served config
    command:
      - control-plane
      - "--config=/etc/warden/config.yaml"
      - "--state-dir=/data"
      - "--listen=0.0.0.0:7070"
      - "--token-env=WARDEN_CP_TOKEN"
      - "--ca-cert=/etc/warden/certs/proxy-ca.crt"   # mint the CP server cert from the proxy CA
      - "--ca-key=/etc/warden/certs/proxy-ca.key"
      - "--tls-host=control-plane,localhost,127.0.0.1"

  warden:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: warden-proxy:dev        # same locally-built image as the control plane
    pull_policy: never             # never fetch from a registry — use the local build
    depends_on:
      control-plane:
        condition: service_started
    networks: [hermes-internal, egress, cp-net]
    ports:
      - "9090:9090"                 # dashboard + /metrics (host-only; NOT reachable by Hermes)
    environment:
      - WARDEN_CP_TOKEN=${WARDEN_CP_TOKEN:-dev-token}
      - WARDEN_PROXY_ID=hermes-worker   # labels this worker in the fleet view
    volumes:
      - ../../configs/config.recipe-worker.yaml:/etc/warden/config.yaml:ro   # managed: policy from the CP
      - ./certs:/etc/warden/certs:ro
      - warden-data:/data            # persist the analytics db across restarts/redeploys
    command:
      - "run"
      - "--config=/etc/warden/config.yaml"
      - "--listen=0.0.0.0:8080"
      - "--ca-cert=/etc/warden/certs/proxy-ca.crt"   # TLS terminate for full visibility; omit both for blind tunnel (domain-only)
      - "--ca-key=/etc/warden/certs/proxy-ca.key"
      - "--admin-listen=0.0.0.0:9090"
      - "--db=/data/warden.db"

  hermes:
    image: nousresearch/hermes-agent:v2026.6.19
    command: ["gateway", "run"]
    depends_on: [warden]
    networks: [hermes-internal]       # internal ONLY — no internet except via Warden
    environment:
      - HERMES_DASHBOARD=1            # expose the Hermes web dashboard on 9119
      # Dashboard login (REQUIRED to expose 9119). Hermes refuses a non-loopback
      # dashboard bind with no auth provider; the socat forwarder reaches it over
      # the bridge (non-loopback), so without this the dashboard falls back to
      # binding 127.0.0.1 inside the container and host port 9119 is unreachable.
      # These env vars register Hermes's built-in username/password provider
      # (env wins over config.yaml — no edit inside the volume needed).
      - HERMES_DASHBOARD_BASIC_AUTH_USERNAME=admin
      - HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=warden   # CHANGE ME — plaintext, hashed in-memory at boot. For real use precompute HERMES_DASHBOARD_BASIC_AUTH_PASSWORD_HASH instead.
      # Optional: a stable 32+ byte secret so login sessions survive restarts.
      # Without it Hermes generates a random per-process key and you re-login after
      # every restart. Generate one with: openssl rand -base64 32
      # - HERMES_DASHBOARD_BASIC_AUTH_SECRET=replace-with-openssl-rand-base64-32
      # Route ALL egress through Warden (both cases for tools that read lowercase)
      - HTTP_PROXY=http://warden:8080
      - HTTPS_PROXY=http://warden:8080
      - http_proxy=http://warden:8080
      - https_proxy=http://warden:8080
      - NO_PROXY=localhost,127.0.0.1,::1,warden
      - no_proxy=localhost,127.0.0.1,::1,warden
      # CRITICAL: Node's built-in fetch (undici) IGNORES HTTP(S)_PROXY unless this
      # is set (Node >= ~v20). Without it, Hermes's fetch() calls go direct and
      # fail on the isolated network ("fetch failed") — they never reach Warden.
      - NODE_USE_ENV_PROXY=1
      # Trust Warden's CA so its terminated-TLS leaf certs are accepted.
      - NODE_EXTRA_CA_CERTS=/etc/warden/certs/proxy-ca.crt
      - SSL_CERT_FILE=/etc/warden/certs/proxy-ca.crt
      - REQUESTS_CA_BUNDLE=/etc/warden/certs/proxy-ca.crt
      - CURL_CA_BUNDLE=/etc/warden/certs/proxy-ca.crt
      # Hand Hermes PLACEHOLDER tokens (e.g. openai_secret_001), never real keys.
      # Real keys live with Warden — map placeholder->envVar in config.recipe.yaml.
    volumes:
      - hermes-data:/opt/data
      - ./certs/proxy-ca.crt:/etc/warden/certs/proxy-ca.crt:ro

  # UI forwarder: an `internal: true` network blocks host port-publishing, so the
  # Hermes gateway API (8642) and dashboard (9119) are exposed via these socat
  # hops instead — WITHOUT giving Hermes an internet route. Only this dumb
  # forwarder touches the frontend bridge; Hermes stays internal-only.
  ui:
    image: alpine/socat:1.8.1.3
    depends_on: [hermes]
    networks: [hermes-internal, frontend]
    ports:
      - "8642:8642"
    command: ["TCP-LISTEN:8642,fork,reuseaddr", "TCP:hermes:8642"]

  # Second forwarder for the optional Hermes dashboard (HERMES_DASHBOARD=1).
  ui-dashboard:
    image: alpine/socat:1.8.1.3
    depends_on: [hermes]
    networks: [hermes-internal, frontend]
    ports:
      - "9119:9119"
    command: ["TCP-LISTEN:9119,fork,reuseaddr", "TCP:hermes:9119"]

networks:
  # internal: true → containers here get NO route to the internet. Hermes is here only.
  hermes-internal:
    internal: true
  # egress carries real internet and is attached ONLY to Warden.
  egress:
    driver: bridge
  # Control-plane bus: worker ↔ control plane, plus the host-published dashboard.
  cp-net:
    driver: bridge
  # frontend carries ONLY the inbound UI forwarders + their host-published ports.
  # Hermes is never attached here, so it gains no internet route.
  frontend:
    driver: bridge

volumes:
  # persistent Warden analytics db — survives `up` / container recreate.
  warden-data:
  # the control plane's writable state: fleet analytics db + editable served config.
  hermes-cp-data:
  # Hermes config / .env / sessions / memories / skills / logs (all under /opt/data).
  hermes-data:
