# Run ZeroClaw behind Warden — full egress visibility, allow-all policy.
#
# ZeroClaw is isolated on an INTERNAL-ONLY network: its sole route to the
# internet is Warden. Warden terminates TLS, allows everything (for now), and
# logs every call to the dashboard at http://localhost:9090/dashboard/ (+/metrics).
#
# ZeroClaw is a Rust binary; its HTTP client (reqwest) honors HTTP(S)_PROXY and
# SSL_CERT_FILE natively, so NO Node fetch workaround is needed here.
#
# Prereq (run from the repo root): generate the bake-once CA into ./certs:
#   OUT_DIR=deploy/compose/certs ./scripts/gen-certs.sh
#
# Run (from the repo root):
#   docker compose -f deploy/compose/docker-compose.zeroclaw.yml up
#
# ZeroClaw API: http://localhost:42617   ·   Warden dashboard: http://localhost:9090/dashboard/

services:
  warden:
    # Pulled from Docker Hub — no local build. Override the tag with WARDEN_VERSION
    # (default 0.2.0), e.g. `WARDEN_VERSION=0.2.1 docker compose ... up`.
    image: ethosagent/warden:${WARDEN_VERSION:-0.2.0}
    networks: [zeroclaw-internal, egress]
    ports:
      - "9090:9090"                 # dashboard + /metrics (host-only; NOT reachable by ZeroClaw)
    volumes:
      - ../../configs/config.recipe.yaml:/etc/warden/config.yaml:ro
      - ./certs:/etc/warden/certs:ro
      - warden-data:/data            # persist the analytics db across restarts/redeploys
    command:
      - "run"
      - "--config=/etc/warden/config.yaml"
      - "--listen=0.0.0.0:8080"
      - "--ca-cert=/etc/warden/certs/proxy-ca.crt"   # TLS terminate for full visibility; omit both for blind tunnel (domain-only)
      - "--ca-key=/etc/warden/certs/proxy-ca.key"
      - "--admin-listen=0.0.0.0:9090"
      - "--db=/data/warden.db"

  zeroclaw:
    # Pinned by digest — this repo has no semver tags (only main/latest/sha-*);
    # the digest is the only immutable identifier. Resolved from :latest 2026-07-01.
    image: ghcr.io/zeroclaw-labs/zeroclaw@sha256:eae321dac2d314bc282bdfb28b5378c9d527998f7e2fe0dee8315bfdcdf13a0c
    # ARM64 note: if the distroless image exits immediately, switch to the Debian
    # variant: image: ghcr.io/zeroclaw-labs/zeroclaw:debian
    depends_on: [warden]
    networks: [zeroclaw-internal]     # internal ONLY — no internet except via Warden
    environment:
      # 42617 is ZeroClaw's container gateway port (per upstream docker-compose.yml).
      - ZEROCLAW_gateway__allow_public_bind=true   # required for container networking
      - ZEROCLAW_gateway__port=42617
      # Hand ZeroClaw a PLACEHOLDER, not a real key — Warden swaps it at the edge.
      # Map this placeholder to a real env var in configs/config.recipe.yaml under
      # `secrets:` once you lock the allowlist down (see the recipe doc).
      - ZEROCLAW_providers__models__openrouter__default__api_key=openrouter_secret_001
      # Route ALL egress through Warden (both cases for tools that read lowercase)
      - HTTP_PROXY=http://warden:8080
      - HTTPS_PROXY=http://warden:8080
      - http_proxy=http://warden:8080
      - https_proxy=http://warden:8080
      - NO_PROXY=localhost,127.0.0.1,::1,warden
      - no_proxy=localhost,127.0.0.1,::1,warden
      # Trust Warden's CA so its terminated-TLS leaf certs are accepted.
      # reqwest (Rust) reads SSL_CERT_FILE; the others cover any bundled tools.
      - SSL_CERT_FILE=/etc/warden/certs/proxy-ca.crt
      - REQUESTS_CA_BUNDLE=/etc/warden/certs/proxy-ca.crt
      - CURL_CA_BUNDLE=/etc/warden/certs/proxy-ca.crt
    volumes:
      - zeroclaw-data:/zeroclaw-data
      - ./certs/proxy-ca.crt:/etc/warden/certs/proxy-ca.crt:ro

  # UI forwarder: an `internal: true` network blocks host port-publishing, so the
  # ZeroClaw gateway is exposed via this tiny socat hop instead. It forwards
  # host:42617 -> zeroclaw:42617 WITHOUT giving ZeroClaw an internet route —
  # ZeroClaw stays internal-only; only this dumb forwarder touches the frontend.
  ui:
    image: alpine/socat:1.8.1.3
    depends_on: [zeroclaw]
    networks: [zeroclaw-internal, frontend]
    ports:
      - "42617:42617"
    command: ["TCP-LISTEN:42617,fork,reuseaddr", "TCP:zeroclaw:42617"]

networks:
  # internal: true → containers here get NO route to the internet. ZeroClaw is here only.
  zeroclaw-internal:
    internal: true
  # egress carries real internet and is attached ONLY to Warden.
  egress:
    driver: bridge
  # frontend carries ONLY the inbound UI forwarder + its host-published port.
  # ZeroClaw is never attached here, so it gains no internet route.
  frontend:
    driver: bridge

volumes:
  # persistent Warden analytics db — survives `up` / container recreate.
  warden-data:
  # ZeroClaw workspace + config.
  zeroclaw-data:
