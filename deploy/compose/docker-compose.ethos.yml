# Run Ethos behind Warden — full egress visibility, allow-all policy.
#
# Ethos is isolated on an INTERNAL-ONLY network: its sole route to the internet
# is Warden. Warden terminates TLS, allows everything (for now), and logs every
# call to the dashboard at http://localhost:9090/dashboard/ (+ /metrics).
#
# Prereq (run from the repo root): generate the bake-once CA into ./certs:
#   OUT_DIR=deploy/compose/certs ./scripts/gen-certs.sh
#
# Run (from the repo root):
#   docker compose -f deploy/compose/docker-compose.ethos.yml up --build
#
# Ethos UI: http://localhost:3000  (and :3001)   ·   Warden dashboard: http://localhost:9090/dashboard/

services:
  warden:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: warden-proxy:dev
    networks: [ethos-internal, egress]
    ports:
      - "9090:9090"                 # dashboard + /metrics (host-only; NOT reachable by Ethos)
    volumes:
      - ../../configs/config.ethos.yaml:/etc/warden/config.yaml:ro
      - ./certs:/etc/warden/certs:ro
      - warden-data:/data            # persist the analytics db across restarts/redeploys
    command:
      - "run"
      - "--config=/etc/warden/config.yaml"
      - "--listen=0.0.0.0:8080"
      - "--ca-cert=/etc/warden/certs/proxy-ca.crt"   # TLS terminate for full visibility; omit both for blind tunnel (domain-only)
      - "--ca-key=/etc/warden/certs/proxy-ca.key"
      - "--admin-listen=0.0.0.0:9090"
      - "--db=/data/warden.db"

  ethos:
    image: ethosagent/ethos:0.5.1
    depends_on: [warden]
    networks: [ethos-internal]        # internal ONLY — no internet except via Warden
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      - ETHOS_MODE=ui
      - ETHOS_WEB_HOST=0.0.0.0
      # Route ALL egress through Warden (both cases for tools that read lowercase)
      - HTTP_PROXY=http://warden:8080
      - HTTPS_PROXY=http://warden:8080
      - http_proxy=http://warden:8080
      - https_proxy=http://warden:8080
      - NO_PROXY=localhost,127.0.0.1,::1,warden
      - no_proxy=localhost,127.0.0.1,::1,warden
      # CRITICAL: Node's built-in fetch (undici) IGNORES HTTP(S)_PROXY unless this
      # is set (Node >= ~v20). Without it, Ethos's fetch() calls go direct and
      # fail on the isolated network ("fetch failed") — they never reach Warden.
      - NODE_USE_ENV_PROXY=1
      # Trust Warden's CA so TLS termination is accepted by every common runtime
      - NODE_EXTRA_CA_CERTS=/etc/warden/certs/proxy-ca.crt
      - SSL_CERT_FILE=/etc/warden/certs/proxy-ca.crt
      - REQUESTS_CA_BUNDLE=/etc/warden/certs/proxy-ca.crt
      - CURL_CA_BUNDLE=/etc/warden/certs/proxy-ca.crt
    volumes:
      - /tmp/ethos-051-test:/home/ethos/.ethos
      - ./certs/proxy-ca.crt:/etc/warden/certs/proxy-ca.crt:ro

  # UI forwarder: an `internal: true` network blocks host port-publishing, so the
  # Ethos web UI is exposed via this tiny socat hop instead. It forwards
  # host:3000 -> ethos:3000 WITHOUT giving Ethos an internet route — Ethos stays
  # internal-only; only this dumb forwarder touches the frontend bridge.
  ui:
    image: alpine/socat
    depends_on: [ethos]
    networks: [ethos-internal, frontend]
    ports:
      - "3000:3000"
    command: ["TCP-LISTEN:3000,fork,reuseaddr", "TCP:ethos:3000"]

networks:
  # internal: true → containers here get NO route to the internet. Ethos is here only.
  ethos-internal:
    internal: true
  # egress carries real internet and is attached ONLY to Warden.
  egress:
    driver: bridge
  # frontend carries ONLY the inbound UI forwarder + its host-published port.
  # Ethos is never attached here, so it gains no internet route.
  frontend:
    driver: bridge

volumes:
  # persistent Warden analytics db — survives `up --build` / container recreate.
  warden-data:
