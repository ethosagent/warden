# Run OpenClaw behind a Warden WORKER, driven by a Warden CONTROL PLANE.
#
# Topology (the real control-plane / data-plane split):
#   control-plane  — serves allow/deny policy and aggregates the worker's
#                    analytics into a fleet dashboard. Holds NO secrets.
#   warden (worker)— the data plane OpenClaw's egress flows through: pulls policy
#                    from the control plane (managed; boots fail-closed until
#                    first pull), terminates TLS, logs every call, forwards
#                    analytics to the control plane.
#   openclaw       — isolated on an INTERNAL-ONLY network; its sole route out is
#                    the worker.
#
# OpenClaw is Node-based; Node's built-in fetch (undici) IGNORES HTTP(S)_PROXY
# unless NODE_USE_ENV_PROXY=1 is set — without it, egress goes direct, fails on
# the isolated network, and never reaches Warden.
#
# The control-plane role is NEWER than the published tag, so both services use a
# LOCALLY BUILT image — run with `--build`.
#
# Prereq (run from the repo root): generate the bake-once CA into ./certs:
#   OUT_DIR=deploy/compose/certs ./scripts/gen-certs.sh
#
# Run (from the repo root):
#   WARDEN_CP_TOKEN=dev-token \
#   docker compose -f deploy/compose/docker-compose.openclaw.yml up --build
#
# OpenClaw UI: http://localhost:18789/#token=warden-dev-token
# Fleet dashboard (control plane): https://localhost:7070/dashboard/  (proxy-CA cert — trust it)
# Worker-local dashboard:          http://localhost:9090/dashboard/

services:
  control-plane:
    # The control-plane role is newer than the published tag → local build.
    # Run with `--build`.
    build:
      context: ../..
      dockerfile: Dockerfile
    image: warden-proxy:dev        # locally built from this repo's Dockerfile
    pull_policy: never             # never fetch from a registry — use the local build
    networks: [cp-net]
    ports:
      - "7070:7070"                  # fleet dashboard + /policy + /central/ingest
    environment:
      - WARDEN_CP_TOKEN=${WARDEN_CP_TOKEN:-dev-token}
    volumes:
      - ../../configs/config.cp-served.yaml:/etc/warden/config.yaml:ro   # served policy
      - ./certs:/etc/warden/certs:ro
      - openclaw-cp-data:/data       # writable state: fleet analytics DB + editable served config
    command:
      - control-plane
      - "--config=/etc/warden/config.yaml"
      - "--state-dir=/data"
      - "--listen=0.0.0.0:7070"
      - "--token-env=WARDEN_CP_TOKEN"
      - "--ca-cert=/etc/warden/certs/proxy-ca.crt"   # mint the CP server cert from the proxy CA
      - "--ca-key=/etc/warden/certs/proxy-ca.key"
      - "--tls-host=control-plane,localhost,127.0.0.1"

  warden:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: warden-proxy:dev        # same locally-built image as the control plane
    pull_policy: never             # never fetch from a registry — use the local build
    depends_on:
      control-plane:
        condition: service_started
    networks: [openclaw-internal, egress, cp-net]
    ports:
      - "9090:9090"                 # dashboard + /metrics (host-only; NOT reachable by OpenClaw)
    environment:
      - WARDEN_CP_TOKEN=${WARDEN_CP_TOKEN:-dev-token}
      - WARDEN_PROXY_ID=openclaw-worker   # labels this worker in the fleet view
    volumes:
      - ../../configs/config.recipe-worker.yaml:/etc/warden/config.yaml:ro   # managed: policy from the CP
      - ./certs:/etc/warden/certs:ro
      - warden-data:/data            # persist the analytics db across restarts/redeploys
    command:
      - "run"
      - "--config=/etc/warden/config.yaml"
      - "--listen=0.0.0.0:8080"
      - "--ca-cert=/etc/warden/certs/proxy-ca.crt"   # TLS terminate for full visibility; omit both for blind tunnel (domain-only)
      - "--ca-key=/etc/warden/certs/proxy-ca.key"
      - "--admin-listen=0.0.0.0:9090"
      - "--db=/data/warden.db"

  openclaw:
    image: ghcr.io/openclaw/openclaw:2026.3.1   # Docker Hub mirror: openclaw/openclaw:2026.3.1
    # --allow-unconfigured: start the gateway before a completed `openclaw setup`
    # (configure providers/channels later via the Control UI). Without it the
    # container exits 78 ("Missing config"). The image's default CMD is
    # `node openclaw.mjs gateway`; we re-state it to append the flag (entrypoint
    # stays tini).
    command: ["node", "openclaw.mjs", "gateway", "--allow-unconfigured"]
    depends_on: [warden]
    networks: [openclaw-internal]     # internal ONLY — no internet except via Warden
    environment:
      # Control UI / gateway auth. In a container OpenClaw auto-binds 0.0.0.0 (so
      # the socat forwarder can reach it) but REFUSES a non-loopback bind without
      # auth. This token unlocks the bind; open the UI with it as a URL *fragment*:
      #   http://localhost:18789/#token=warden-dev-token
      - OPENCLAW_GATEWAY_TOKEN=warden-dev-token   # CHANGE ME — use OPENCLAW_GATEWAY_PASSWORD for password auth instead
      # Route ALL egress through Warden (both cases for tools that read lowercase)
      - HTTP_PROXY=http://warden:8080
      - HTTPS_PROXY=http://warden:8080
      - http_proxy=http://warden:8080
      - https_proxy=http://warden:8080
      - NO_PROXY=localhost,127.0.0.1,::1,warden
      - no_proxy=localhost,127.0.0.1,::1,warden
      # CRITICAL: Node's built-in fetch (undici) IGNORES HTTP(S)_PROXY unless this
      # is set (Node >= ~v20). Without it, OpenClaw's fetch() calls go direct and
      # fail on the isolated network ("fetch failed") — they never reach Warden.
      - NODE_USE_ENV_PROXY=1
      # Trust Warden's CA so its terminated-TLS leaf certs are accepted.
      - NODE_EXTRA_CA_CERTS=/etc/warden/certs/proxy-ca.crt
      - SSL_CERT_FILE=/etc/warden/certs/proxy-ca.crt
      - REQUESTS_CA_BUNDLE=/etc/warden/certs/proxy-ca.crt
      - CURL_CA_BUNDLE=/etc/warden/certs/proxy-ca.crt
      # Hand OpenClaw PLACEHOLDER tokens (e.g. openai_secret_001), never real keys.
      # Real keys live with Warden — map placeholder->envVar in config.recipe.yaml.
    volumes:
      - openclaw-config:/home/node/.openclaw
      - ./certs/proxy-ca.crt:/etc/warden/certs/proxy-ca.crt:ro

  # UI forwarder: an `internal: true` network blocks host port-publishing, so the
  # OpenClaw Control UI is exposed via this tiny socat hop instead. It forwards
  # host:18789 -> openclaw:18789 WITHOUT giving OpenClaw an internet route.
  # OpenClaw auto-binds 0.0.0.0 inside a container (bind=auto) once gateway auth
  # is set (OPENCLAW_GATEWAY_TOKEN above), so this socat hop reaches it fine.
  ui:
    image: alpine/socat:1.8.1.3
    depends_on: [openclaw]
    networks: [openclaw-internal, frontend]
    ports:
      - "18789:18789"
    command: ["TCP-LISTEN:18789,fork,reuseaddr", "TCP:openclaw:18789"]

networks:
  # internal: true → containers here get NO route to the internet. OpenClaw is here only.
  openclaw-internal:
    internal: true
  # egress carries real internet and is attached ONLY to Warden.
  egress:
    driver: bridge
  # Control-plane bus: worker ↔ control plane, plus the host-published dashboard.
  cp-net:
    driver: bridge
  # frontend carries ONLY the inbound UI forwarder + its host-published port.
  # OpenClaw is never attached here, so it gains no internet route.
  frontend:
    driver: bridge

volumes:
  # persistent Warden analytics db — survives `up` / container recreate.
  warden-data:
  # the control plane's writable state: fleet analytics db + editable served config.
  openclaw-cp-data:
  # OpenClaw config / auth profiles / workspace.
  openclaw-config:
