# Warden — local dev harness (Docker Compose).
#
# Encodes the core isolation: the agent runs on an INTERNAL-ONLY network with no
# route to the internet. Its only egress path is the Warden proxy, which sits on
# both the internal network (to receive agent traffic) and an external network
# (the only service with real internet access).
#
# This is the structural guarantee — the agent cannot reach the internet even if
# it is fully compromised, because Docker's network namespaces deny it a route.
#
# Prereq: generate the bake-once CA into ./certs (this directory) first:
#   OUT_DIR=deploy/compose/certs ./scripts/gen-certs.sh   # run from the repo root
# See docs/docker-end-to-end.md for the full walkthrough.

services:
  proxy:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: warden-proxy:dev
    networks:
      - agent-internal              # receives agent traffic
      - egress                      # the ONLY service with internet access
    ports:
      - "9090:9090"                 # dashboard + admin (host -> proxy); NOT reachable by the agent
    environment:
      # Real secrets live with the proxy, never the agent.
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ../../configs/config.example.yaml:/etc/warden/config.yaml:ro
      - ./certs:/etc/warden/certs:ro   # bake-once CA (see scripts/gen-certs.sh)
    command:
      - "run"
      - "--config=/etc/warden/config.yaml"
      - "--listen=0.0.0.0:8080"
      - "--ca-cert=/etc/warden/certs/proxy-ca.crt"   # terminate TLS (swap + inspect); omit for blind tunnel
      - "--ca-key=/etc/warden/certs/proxy-ca.key"
      - "--admin-listen=0.0.0.0:9090"                 # dashboard + /healthz + /admin/refresh-secrets
      - "--db=/tmp/warden.db"

  agent:
    image: alpine:3.20               # stand-in for the real agent runtime
    depends_on:
      - proxy
    networks:
      - agent-internal               # internal ONLY — no egress network attached
    environment:
      # The agent holds placeholders only, and is pointed at the proxy for egress.
      - HTTPS_PROXY=http://proxy:8080
      - HTTP_PROXY=http://proxy:8080
      - OPENAI_API_KEY=openai_secret_001       # placeholder, NOT the real key
      - ANTHROPIC_API_KEY=anthropic_secret_001 # placeholder, NOT the real key
    volumes:
      # The agent must TRUST the proxy CA (Warden presents leaf certs signed by it).
      - ./certs/proxy-ca.crt:/etc/warden/certs/proxy-ca.crt:ro
    command: ["sh", "-c", "echo 'agent placeholder — no internet route except via proxy'; sleep infinity"]

networks:
  # internal: true means containers on this network get NO route to the host /
  # internet. The agent is attached only here.
  agent-internal:
    internal: true
  # egress carries real internet access and is attached ONLY to the proxy.
  egress:
    driver: bridge
